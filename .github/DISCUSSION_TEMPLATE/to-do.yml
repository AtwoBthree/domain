# .github/DISCUSSION_TEMPLATE/to-do.yml
title: "[TO DO] "
labels: ["todo", "enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        > [!IMPORTANT]
        > **AtwoBthree 프로젝트 작업 관리**
        > 구현해야 할 기능을 구체적인 체크리스트 형태로 정의해 주세요.
        
        ```diff
        + 담당자나 마감 기한이 있다면 상세 내용에 포함해 주세요.
        ! 작업 범위가 너무 크다면 여러 개의 TO DO로 나누는 것이 좋습니다.
        ```

  - type: textarea
    id: overview
    attributes:
      label: "작업 개요"
      description: "무엇을 개발하거나 개선해야 하는지 요약해 주세요."
      placeholder: "예: Flutter 앱의 로그인 세션 유지 로직 구현"
    validations:
      required: true

  - type: textarea
    id: checklist
    attributes:
      label: "세부 작업 체크리스트"
      description: "완료해야 할 세부 항목들을 작성해 주세요."
      value: |
        - [ ] 
        - [ ] 
        - [ ] 
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: "우선순위"
      description: "이 작업의 긴급도를 선택해 주세요."
      options:
        - "🔴 High"
        - "🟡 Medium"
        - "🔵 Low"
    validations:
      required: true

  - type: textarea
    id: technical_note
    attributes:
      label: "기술적 고려 사항"
      description: "사용할 라이브러리나 주의해야 할 로직을 적어주세요."
    validations:
      required: false

  - type: textarea
    id: definition_of_done
    attributes:
      label: "완료 조건"
      description: "어떤 상태가 되었을 때 이 작업을 '완료'로 간주할까요?"
      placeholder: "예: 유저가 앱을 재실행해도 로그인이 유지됨 확인"
    validations:
      required: true
