# .github/DISCUSSION_TEMPLATE/to-do.yml
name: "📝 Task & To-do"
description: "새로운 작업 할 일(To-do)을 등록하고 실행 계획을 세웁니다."
title: "[TO DO] "
labels: ["todo", "enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        > [!IMPORTANT]
        > **AtwoBthree 프로젝트 작업 관리**
        > 구현해야 할 기능을 구체적인 체크리스트 형태로 정의해 주세요.
        
        ```diff
        + 담당자나 마감 기한이 있다면 상세 내용에 포함해 주세요.
        ! 작업 범위가 너무 크다면 여러 개의 TO DO로 나누는 것이 좋습니다.
        ```

  - type: textarea
    id: overview
    attributes:
      label: "작업 개요"
      description: "무엇을 개발하거나 개선해야 하는지 한 문장으로 요약해 주세요."
      placeholder: "예: Flutter 앱의 로그인 세션 유지 로직 구현"
    validations:
      required: true

  - type: textarea
    id: checklist
    attributes:
      label: "세부 작업 체크리스트"
      description: "완료해야 할 세부 항목들을 작성해 주세요."
      value: |
        - [ ] 
        - [ ] 
        - [ ] 
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: "우선순위"
      description: "이 작업의 긴급도와 중요도를 선택해 주세요."
      options:
        - "🔴 High (즉시 처리 필요)"
        - "🟡 Medium (이번 스프린트 내 완료)"
        - "🔵 Low (여유 있을 때 진행)"
    validations:
      required: true

  - type: textarea
    id: technical_note
    attributes:
      label: "기술적 고려 사항 (선택)"
      description: "사용할 라이브러리, API 엔드포인트, 혹은 주의해야 할 로직을 적어주세요."
      placeholder: "예: Socket.io의 재연결 로직에서 메모리 누수 확인 필요"
    validations:
      required: false

  - type: textarea
    id: definition_of_done
    attributes:
      label: "완료 조건 (Definition of Done)"
      description: "어떤 상태가 되었을 때 이 작업을 '완료'로 간주할지 정의해 주세요."
      placeholder: "예: 유저가 앱을 재실행해도 24시간 동안 로그인이 유지되어야 함"
    validations:
      required: true
