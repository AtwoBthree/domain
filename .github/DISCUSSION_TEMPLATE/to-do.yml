# .github/DISCUSSION_TEMPLATE/to-do.yml
title: "[TO DO] "
labels: ["todo", "enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        > [!IMPORTANT]
        > **Team AtwoBthree 작업 가이드**
        > 팀원들이 작업 내용을 명확히 이해할 수 있도록 구체적으로 작성해 주세요.
        
        ```diff
        + 관련 이슈나 문서가 있다면 링크를 첨부해 주세요.
        # 작업이 완료되면 체크박스를 업데이트해 주세요.
        ```

  - type: textarea
    id: task_summary
    attributes:
      label: "📌 작업 요약"
      description: "어떤 작업을 수행해야 하는지 핵심 내용을 작성해 주세요."
      placeholder: "예: API 응답 데이터 캐싱 로직 구현 및 예외 처리"
    validations:
      required: true

  - type: textarea
    id: task_list
    attributes:
      label: "✅ 세부 할 일 목록"
      description: "작업을 완료하기 위해 필요한 단계별 체크리스트입니다."
      value: |
        - [ ] 기능 설계 및 인터페이스 정의
        - [ ] 핵심 로직 구현
        - [ ] 단위 테스트(Unit Test) 작성 및 통과
        - [ ] 관련 문서(Readme 등) 업데이트
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: "🚨 우선순위"
      description: "팀 내 논의를 통해 결정된 작업의 긴급도를 선택해 주세요."
      options:
        - "🔴 High (중요 결함 수정 또는 핵심 기능)"
        - "🟡 Medium (일반적인 기능 개선 및 개발)"
        - "🔵 Low (사소한 UI 수정 또는 리팩토링)"
    validations:
      required: true

  - type: textarea
    id: technical_specs
    attributes:
      label: "🛠 기술 스펙 및 참고 사항"
      description: "사용할 스택, 라이브러리, 또는 아키텍처 관련 참고 사항을 적어주세요."
      placeholder: "예: Redis를 활용한 캐싱 처리, 기존 인터페이스 하위 호환성 유지 필요"
    validations:
      required: false

  - type: textarea
    id: dod
    attributes:
      label: "🏁 완료 조건 (Definition of Done)"
      description: "이 작업이 최종적으로 '완료'되었다고 판단하는 기준입니다."
      placeholder: "예: 모든 API 응답 시간이 200ms 이내로 단축되고 에러 없이 병합됨"
    validations:
      required: true
