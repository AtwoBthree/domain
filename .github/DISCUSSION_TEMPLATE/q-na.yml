# .github/DISCUSSION_TEMPLATE/q-na.yml
title: "[Q&A] "
labels: ["question", "help wanted"]
body:
  - type: markdown
    attributes:
      value: |
        > [!TIP]
        > **질문 전 확인해 주세요!**
        > 해결하고 싶은 문제나 궁금한 점을 구체적으로 적어주시면 팀원들이 더 빠르게 도움을 줄 수 있습니다.
        
        ```diff
        + 에러 로그나 스크린샷이 있다면 큰 도움이 됩니다.
        # 문제가 해결되면 'Answer'를 채택하거나 제목을 [SOLVED]로 변경해 주세요.
        ```

  - type: textarea
    id: problem_description
    attributes:
      label: "❓ 질문 내용"
      description: "궁금한 내용이나 현재 겪고 있는 문제를 설명해 주세요."
      placeholder: "예: Flutter에서 특정 위젯이 화면 크기에 따라 깨지는 현상이 발생합니다."
    validations:
      required: true

  - type: textarea
    id: attempts
    attributes:
      label: "🔍 시도해본 방법"
      description: "문제를 해결하기 위해 이미 시도해본 코드나 검색해본 내용이 있다면 적어주세요."
      placeholder: "예: 공문서를 참고하여 Expanded 위젯을 사용해봤지만 해결되지 않았습니다."
    validations:
      required: true

  - type: textarea
    id: error_logs
    attributes:
      label: "💻 에러 로그 또는 스크린샷 (선택)"
      description: "관련 코드 스니펫이나 에러 터미널 출력값을 붙여넣어 주세요."
      placeholder: "
http://googleusercontent.com/immersive_entry_chip/0

---

### 🛠️ 주요 구성 포인트

1.  **시도해본 방법(Attempts)**: 단순히 "안 돼요"라고 하기보다, 무엇을 시도했는지 적게 하여 답변자가 중복된 답변을 하지 않도록 유도했습니다.
2.  **프로젝트 분류**: AtwoBthree의 주요 프로젝트들을 드롭다운에 넣어 질문의 범위를 바로 파악할 수 있게 했습니다.
3.  **코드 블록 가이드**: 에러 로그를 적을 때 Markdown 코드 블록(```)을 사용하도록 예시를 넣어 가독성을 높였습니다.

### ✅ 적용 방법
1.  이 코드를 `.github/DISCUSSION_TEMPLATE/q-na.yml`로 저장합니다.
2.  저장소 **Settings > Discussions > Categories**에서 **Q&A** 카테고리(혹은 유사한 카테고리)의 **Edit**를 클릭합니다.
3.  **Discussion template**에서 `q-na.yml`을 선택하고 저장합니다.

이제 팀원들이 질문을 올릴 때 훨씬 더 체계적으로 소통할 수 있을 거예요! 다른 필요한 템플릿이 더 있으신가요?
