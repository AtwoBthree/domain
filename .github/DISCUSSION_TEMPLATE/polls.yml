# .github/DISCUSSION_TEMPLATE/polls.yml
title: "[Poll] "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        > [!NOTE]
        > **팀 의사결정 및 투표**
        > 기술 스택, 아키텍처, 또는 프로젝트 방향성에 대한 팀원들의 의견을 수렴합니다.
        
        ```diff
        + 투표를 개설하기 전, 각 선택지의 장단점을 명확히 기재해 주시면 결정에 큰 도움이 됩니다.
        # 안건에 대한 충분한 배경 지식을 먼저 공유해 주세요.
        ```

  - type: textarea
    id: agenda
    attributes:
      label: "투표 안건 및 배경"
      description: "어떤 사안에 대해 투표를 진행하는지, 왜 이 결정이 필요한지 설명해 주세요."
      placeholder: "AtwoBthree 프로젝트의 새로운 백엔드 아키텍처 도입 건에 대한 의견을 취합하고자 합니다."
    validations:
      required: true

  - type: textarea
    id: options-context
    attributes:
      label: "선택지 상세 설명"
      description: "하단 UI에서 추가할 투표 항목들에 대한 부연 설명이나 각각의 기술적 장단점을 적어주세요."
      placeholder: "A안: 초기 설정은 복잡하지만 향후 확장성이 뛰어남\nB안: 러닝 커브가 낮고 기존 코드 베이스에 빠르게 적용 가능"
    validations:
      required: false
