name: Role
description: 팀 내 역할 분담 및 담당 파트를 지정하고 공유합니다.
title: "[Role] "
labels: ["role", "team-setup"]
body:
  - type: markdown
    attributes:
      value: |
        ## 👥 팀원 역할 정의
        현재 프로젝트에서 담당하고 있는 메인 파트와 세부 사항을 작성해 주세요.
  - type: textarea
    id: role-assignment
    attributes:
      label: "역할 및 담당자"
      description: "이름과 담당 파트를 형식에 맞춰 작성하세요."
      placeholder: |
        이름
        - [ ] Flutter 프론트엔드 개발
        - [ ] 상태 관리 로직 설계
        
        이름
        - [ ] Spring Boot 백엔드 API 설계
        - [ ] DB 스키마 최적화
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: "기타 참고사항"
      description: "협업 시 주의사항이나 전달할 내용을 적어주세요."
